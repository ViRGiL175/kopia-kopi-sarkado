name: CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Install Kopia
        shell: bash
        run: |
          set -euo pipefail
          KOPIA_VERSION=0.22.3
          curl -fsSL -o /tmp/kopia.tar.gz "https://github.com/kopia/kopia/releases/download/v${KOPIA_VERSION}/kopia-${KOPIA_VERSION}-linux-x64.tar.gz"
          tar -xzf /tmp/kopia.tar.gz -C /tmp
          sudo install /tmp/kopia-${KOPIA_VERSION}-linux-x64/kopia /usr/local/bin/kopia
          kopia --version

      - name: Run tests
        shell: bash
        run: go test ./...
